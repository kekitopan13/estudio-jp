<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Mis Apps de Japonés</title>
    <style>
        body {
            font-family: system-ui, -apple-system, sans-serif;
            background-color: #f5f5f7;
            display: flex;
            flex-direction: column;
            align-items: center;
            padding: 20px;
            color: #1d1d1f;
        }
        h1 { font-size: 1.5rem; margin-bottom: 20px; color: #5b21b6; }
        .menu-container {
            width: 100%;
            max-width: 400px;
            display: flex;
            flex-direction: column;
            gap: 15px;
        }
        .app-card {
            background: white;
            padding: 20px;
            border-radius: 15px;
            text-decoration: none;
            color: inherit;
            box-shadow: 0 2px 8px rgba(0,0,0,0.05);
            display: flex;
            align-items: center;
            transition: transform 0.2s;
        }
        .app-card:active { transform: scale(0.98); background: #f0f0f0; }
        .icon {
            font-size: 2rem;
            margin-right: 15px;
        }
        .details b { display: block; font-size: 1.1rem; margin-bottom: 4px; }
        .details span { font-size: 0.85rem; color: #666; }
    </style>
</head>
<body>

    <h1>学習メニュー</h1>

    <div class="menu-container">
        <a href="kanji_study.html" class="app-card">
            <div class="icon">📝</div>
            <div class="details">
                <b>Estudio de Kanji</b>
                <span>Fases de alternativas y escritura.</span>
            </div>
        </a>

        <a href="matchup_inline.html" class="app-card">
            <div class="icon">🧩</div>
            <div class="details">
                <b>Match Up</b>
                <span>Unir kanji con su lectura correspondiente.</span>
            </div>
        </a>
    </div>

</body>
</html>
